<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pune Weather</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">


    <div class="header">
        <div>
            <h2>📍 Pune, India</h2>
            <p id="time"></p>
        </div>
        <div class="temp">
            <h1 id="temp">--°</h1>
            <p id="condition">--</p>
        </div>
    </div>


    <div class="highlight">
        <h3>Weather Status</h3>
        <p id="status">Loading...</p>
    </div>


    <div class="grid" id="weatherContainer"></div>

</div>

<script src="main.js"></script>
</body>
</html>
